name: Release Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Stage Runtime Package
        run: node ./scripts/stage-runtime-package.mjs

      - name: Upload Runtime Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: better-crafting-runtime-package
          path: dist/package
          if-no-files-found: error
